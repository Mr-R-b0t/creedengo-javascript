name: CI

on:
  push:
    branches: [main]
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Use JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: yarn install --immutable
        working-directory: eslint-plugin

      - name: Lint eslint-plugin
        run: yarn lint
        working-directory: eslint-plugin

      - name: Test eslint-plugin
        run: yarn test:cov
        working-directory: eslint-plugin

      - name: Build SonarQube plugin
        run: mvn -e -B package
        working-directory: sonar-plugin

      - name: Integration test with SonarQube
        run: docker compose up --wait

  sonarcloud-scan:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    if: |
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) &&
      github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Use JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: yarn install --immutable
        working-directory: eslint-plugin

      - name: Test eslint-plugin
        run: yarn test:cov --test-reporter=lcov --test-reporter-destination=lcov.info
        working-directory: eslint-plugin

      - name: Compile SonarQube plugin
        run: mvn -e -B compile
        working-directory: sonar-plugin

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
